name: Deploy MirageAI Bot

on:
  push:
    branches:
      - main
    paths:
      - 'bot/**'
      - 'requirements.txt'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Copy bot files to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "bot/,requirements.txt"
          target: "/root/mirageai_bot"

      - name: Restart bot service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            pip3 install -r /root/mirageai_bot/requirements.txt -q
            systemctl restart mirageai
            sleep 2
            systemctl is-active mirageai && echo "✅ Bot deployed and running!" || echo "❌ ERROR: Bot failed to start"
            journalctl -u mirageai -n 10 --no-pager
