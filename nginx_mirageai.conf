server {
    listen 80;
    server_name mirageai.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name mirageai.duckdns.org;

    ssl_certificate /etc/letsencrypt/live/mirageai.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mirageai.duckdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
        client_max_body_size 20m;

        # CORS headers только здесь, Python их не дублирует
        # (убраны — CORS уже добавляет Python api_server.py)
    }
}
